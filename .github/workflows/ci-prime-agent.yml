name: Prime Agent CI

on:
  pull_request:
    paths: ['packages/prime-agent/**']
  push:
    branches: [main]
    paths: ['packages/prime-agent/**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/prime-agent

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('packages/prime-agent/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv dependencies
        run: |
          python -m pip install --user uv
          python -m uv sync --frozen --all-extras --all-groups

      - name: Lint source
        run: python -m uv run ruff check src/

      - name: Run tests
        run: python -m uv run pytest tests/ -v
